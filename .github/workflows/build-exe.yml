name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create clean virtual environment
        run: |
          python -m venv venv
          venv\Scripts\pip install --upgrade pip setuptools wheel
          venv\Scripts\pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          venv\Scripts\pyinstaller --onefile `
            --name kakao2notion `
            --hidden-import=sklearn `
            --hidden-import=sklearn.cluster `
            --hidden-import=sklearn.metrics `
            --hidden-import=sklearn.feature_extraction `
            --hidden-import=notion_client `
            --hidden-import=rich `
            --hidden-import=click `
            --hidden-import=prompt_toolkit `
            --collect-all=rich `
            --collect-all=prompt_toolkit `
            __main__.py

      - name: Check build result
        run: |
          if (Test-Path "dist\kakao2notion.exe") {
            Write-Host "✅ Build successful!"
            Get-Item "dist\kakao2notion.exe" | Format-List Name, Length
          } else {
            Write-Host "❌ Build failed - exe not found"
            exit 1
          }

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/kakao2notion.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
